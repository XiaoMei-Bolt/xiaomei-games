<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🌟小美识字乐园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Noto Sans SC','KaiTi','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#fef9c3 0%,#fef3c7 50%,#fde68a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;overflow-y:auto}
.c{width:100%;max-width:500px;padding:12px;min-height:100vh;display:flex;flex-direction:column}
.btn{border:none;border-radius:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(.94)}
.btn-y{background:#f59e0b;color:#fff}.btn-y:hover{background:#d97706}
.btn-g{background:#10b981;color:#fff}.btn-p{background:#8b5cf6;color:#fff}
.btn-o{background:#fff;border:3px solid #fbbf24;color:#92400e}
.btn-xl{font-size:20px;padding:14px 28px}.btn-lg{font-size:17px;padding:11px 22px}.btn-sm{font-size:14px;padding:8px 16px}

.home{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.home .logo{font-size:72px;animation:bounce 1.5s ease-in-out infinite}
.home h1{font-size:30px;color:#92400e;text-shadow:2px 2px 0 rgba(255,255,255,.5)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.tiers{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px}
.tier{background:#fff;border-radius:16px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.05);text-align:left}
.tier.locked{opacity:.5}
.tier .tier-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tier .tier-name{font-size:16px;font-weight:700}
.tier .tier-badge{font-size:12px;padding:2px 10px;border-radius:8px;font-weight:600}
.badge-easy{background:#dcfce7;color:#166534}.badge-med{background:#fef3c7;color:#92400e}.badge-hard{background:#fee2e2;color:#991b1b}.badge-lock{background:#e5e7eb;color:#9ca3af}
.tier .tier-stat{font-size:12px;color:#78716c}
.tier-bar-outer{height:6px;background:#fef3c7;border-radius:3px;overflow:hidden;margin-top:4px}
.tier-bar-inner{height:100%;border-radius:3px;transition:width .5s}
.tier-bar-easy{background:#10b981}.tier-bar-med{background:#f59e0b}.tier-bar-hard{background:#ef4444}

.stats-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.stat-card{background:#fff;border-radius:14px;padding:10px 16px;box-shadow:0 2px 8px rgba(0,0,0,.05);text-align:center;min-width:60px}
.stat-card .num{font-size:24px;font-weight:800;color:#f59e0b}
.stat-card .lbl{font-size:10px;color:#a8a29e}

.game{flex:1;display:flex;flex-direction:column;gap:10px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.top-bar .back{font-size:22px;background:none;border:none;cursor:pointer;padding:2px 6px}
.top-bar .info{font-size:14px;color:#92400e;font-weight:600;display:flex;align-items:center;gap:8px}
.prog-outer{height:8px;background:#fef3c7;border-radius:4px;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,#fbbf24,#10b981);border-radius:4px;transition:width .4s}

.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border-radius:22px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.05);text-align:center;gap:8px}
.card-area .prompt{font-size:16px;color:#78716c}
.card-area .disp{font-size:80px;line-height:1.1;animation:float 2.5s ease-in-out infinite}
.card-area .disp.ch{font-size:64px;font-weight:700;color:#78350f;font-family:'KaiTi','PingFang SC',serif}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.card-area .hint{font-size:13px;color:#a8a29e;padding:0 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt{background:#fefce8;border:3px solid #fde68a;border-radius:14px;padding:14px 6px;font-size:30px;font-weight:700;color:#78350f;cursor:pointer;transition:all .2s;font-family:'KaiTi','PingFang SC',serif}
.opt:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(251,191,36,.18)}
.opt.ok{background:#dcfce7;border-color:#4ade80;color:#166534;animation:pop .5s}
.opt.ko{background:#fee2e2;border-color:#f87171;color:#991b1b;animation:shake .5s}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.fpop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:64px;pointer-events:none;z-index:100}
.fpop.show{animation:fbPop 1s ease-out forwards}
@keyframes fbPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s}
.card-r{background:#fff;border-radius:26px;padding:28px 22px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.1);max-width:360px;width:90%;animation:scaleIn .4s}
.card-r .trophy{font-size:56px}.card-r h2{font-size:22px;color:#92400e;margin:6px 0}.card-r .bn{font-size:40px;font-weight:800;color:#f59e0b}
.card-r .detail{font-size:12px;color:#a8a29e;margin:3px 0}.card-r .btn-row{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.confetti{position:fixed;z-index:250;pointer-events:none;animation:cf 2s ease-out forwards}
@keyframes cf{0%{transform:translateY(-60px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@media(max-width:400px){.home .logo{font-size:52px}.home h1{font-size:22px}.card-area .disp{font-size:56px}.card-area .disp.ch{font-size:46px}.opt{font-size:24px;padding:10px 4px}}
</style>
</head>

function tierStats(){
  const r=[];
  for(let t=0;t<3;t++){
    const minD=t*3+1, maxD=t*3+3;
    const pool=CHARS.filter(c=>c.d>=minD&&c.d<=maxD);
    let correct=0,wrong=0;
    pool.forEach(c=>{correct+=S.correct[c.c]||0;wrong+=S.wrong[c.c]||0});
    const total=correct+wrong;
    const mastery=total>0?correct/total:0;
    r.push({name:['🌟 初级 (300字)','⭐ 中级 (1000字)','💎 高级 (2000字)'][t],pool:pool.length,correct,wrong,total,mastery,minD,maxD,unlocked:S.unlockedTiers.includes(t+1)});
  }
  return r;
}

function canUnlock(tierIdx){
  if(tierIdx===0)return true;
  const prev=tierStats()[tierIdx-1];
  return prev.mastery>=0.6&&prev.correct>=20;
}

// ═══════════════════════════════════════
// 选题 (间隔重复 + 自适应难度)
// ═══════════════════════════════════════
function getPool(){
  const ts=tierStats();
  let pool=[];
  ts.forEach((t,i)=>{if(t.unlocked) pool.push(...CHARS.filter(c=>c.d>=t.minD&&c.d<=t.maxD));});
  if(pool.length===0) pool=CHARS.filter(c=>c.d<=3);
  return pool;
}

function pickQ(){
  const pool=getPool();
  // 优先复习
  const review=[];
  for(const c of pool){
    const w=S.wrong[c.c]||0;
    const ok=S.correct[c.c]||0;
    if(w>0&&ok<8) review.push({c,score:w*3-ok});
  }
  let target;
  if(review.length>0&&Math.random()<0.55){
    review.sort((a,b)=>b.score-a.score);
    target=pool.find(p=>p.c===review[0].c)||pool[Math.floor(Math.random()*pool.length)];
  }else{
    const weights=pool.map(c=>{const w=S.wrong[c.c]||0;const ok=S.correct[c.c]||0;return 1+(w*4)/(ok+1)});
    const total=weights.reduce((a,b)=>a+b,0);let r=Math.random()*total;
    for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){target=pool[i];break}}
    if(!target) target=pool[Math.floor(Math.random()*pool.length)];
  }
  // 正确计数高的随机跳过
  if((S.correct[target.c]||0)>10&&Math.random()<0.3) target=pool[Math.floor(Math.random()*pool.length)];
  // 选项
  const wrongs=pool.filter(c=>c.c!==target.c).sort(()=>Math.random()-.5).slice(0,3);
  return {target,opts:[target,...wrongs].sort(()=>Math.random()-.5),lvl:target.d};
}

let actx=null;
function ctx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,t='sine',v=0.1){
  try{const o=ctx().createOscillator(),g=ctx().createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ctx().currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx().currentTime+d);o.connect(g);g.connect(ctx().destination);o.start();o.stop(ctx().currentTime+d)}catch(e){}
}

    <div class="stats-row">
      <div class="stat-card"><div class="num">⭐${S.totalCorrect}</div><div class="lbl">正确</div></div>
      <div class="stat-card"><div class="num">🔄${S.totalWrong}</div><div class="lbl">待复习</div></div>
      <div class="stat-card"><div class="num">📝${Object.keys(S.correct).length}</div><div class="lbl">已识字</div></div>
      <div class="stat-card"><div class="num">🔥${S.bestStreak}</div><div class="lbl">最佳连胜</div></div>
    </div>
    <div class="tiers">${tierHTML}</div>
    <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px">
      <button class="btn btn-y btn-xl" onclick="startGame('emoji')">🖼️ 看图识字</button>
      <button class="btn btn-g btn-xl" onclick="startGame('char2emoji')">📝 看字找图</button>
      <button class="btn btn-p btn-xl" onclick="startGame('meaning')">💡 看提示猜字</button>
      <button class="btn btn-o btn-sm" onclick="resetData()" style="margin-top:4px">🔄 重新开始</button>
    </div>
  </div>`;
}

function startGame(mode){
  ctx();S.mode=mode;roundInSession=0;answering=false;nextRound();
}

function nextRound(){
  q=pickQ();answering=false;roundInSession++;S.rounds++;
  const app=document.getElementById('app');
  const t=q.target,m=S.mode;
  let disp,dispClass='',hint='';
  if(m==='emoji'){disp=t.e||'📝';hint=t.h;dispClass=''}
  else if(m==='char2emoji'){disp=t.c;dispClass='ch'}
  else{disp='💡';hint='提示：'+t.h;dispClass=''}
  const ts=tierStats();
  app.innerHTML=`
  <div class="game">
    <div class="top-bar">
      <button class="back" onclick="renderHome()">🏠</button>
      <div class="info"><span>🔥${S.streak}</span><span class="tier-badge ${q.lvl<=3?'badge-easy':q.lvl<=6?'badge-med':'badge-hard'}">Lv${q.lvl}</span><span>⭐${S.totalCorrect}</span></div>
    </div>
    <div class="prog-outer"><div class="prog-inner" style="width:${Math.min(100,roundInSession/20*100)}%"></div></div>
    <div class="card-area">
      <div class="prompt">${m==='emoji'?'这是什么字？':m==='char2emoji'?'找一找对应的图？':'根据提示选正确的字'}</div>
      <div class="disp ${dispClass}">${disp}</div>
      ${hint?`<div class="hint">💡 ${hint}</div>`:''}
      <div class="grid2" id="opts"></div>
    </div>
  </div>`;
  const grid=document.getElementById('opts');
  q.opts.forEach(o=>{
    const btn=document.createElement('button');btn.className='opt';
    btn.textContent=m==='char2emoji'?(o.e||'❓'):o.c;
    btn.addEventListener('click',()=>handleAnswer(o.c));grid.appendChild(btn);
  });
}

function handleAnswer(chosen){
  if(answering)return;answering=true;
  const ok=chosen===q.target.c;
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent===chosen) b.classList.add(ok?'ok':'ko');
    if(!ok&&b.textContent===q.target.c) setTimeout(()=>b.classList.add('ok'),400);
  });
  if(ok){S.correct[q.target.c]=(S.correct[q.target.c]||0)+1;if(S.wrong[q.target.c])S.wrong[q.target.c]--;S.totalCorrect++;S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;S.recent.push(true);sfxOk();showFb('✅')}
  else{S.wrong[q.target.c]=(S.wrong[q.target.c]||0)+1;S.totalWrong++;S.streak=0;S.recent.push(false);sfxNo();showFb('❌')}
  if(S.recent.length>25)S.recent.shift();
  S.lastReview[q.target.c]=S.rounds;
  // 自适应解锁
  for(let i=1;i<3;i++){if(canUnlock(i)&&!S.unlockedTiers.includes(i+1)){S.unlockedTiers.push(i+1);sfxWin()}}
  save(S);
  setTimeout(()=>{if(roundInSession%20===0&&roundInSession>=40) showResult();else nextRound()},ok?650:1000);
}

function showFb(e){const el=document.getElementById('fpop');el.textContent=e;el.classList.remove('show');void el.offsetWidth;el.classList.add('show')}
function cf(){const cs=['#fbbf24','#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#ec4899'];for(let i=0;i<30;i++)setTimeout(()=>{const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';d.style.top=-(Math.random()*20+5)+'px';d.style.width=(Math.random()*8+4)+'px';d.style.height=(Math.random()*8+4)+'px';d.style.background=cs[Math.floor(Math.random()*cs.length)];d.style.borderRadius=Math.random()>.5?'50%':'2px';d.style.animationDuration=(Math.random()*1.5+1)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),2500)},i*25)}

function showResult(){
  const recent=S.recent.slice(-20);const acc=recent.length>0?Math.round(recent.filter(r=>r).length/recent.length*100):0;
  const ts=tierStats();sfxWin();cf();
  document.getElementById('app').innerHTML=`
  <div class="overlay" onclick="event.target===this&&nextRound()">
    <div class="card-r">
      <div class="trophy">${acc>=80?'🏆':acc>=60?'🌟':'💪'}</div>
      <h2>${acc>=80?'太棒了！':acc>=60?'继续加油！':'别灰心！'}</h2>
      <div class="bn">${acc}%</div><div class="detail">最近20题正确率</div>
      <div class="detail">已识字：${Object.keys(S.correct).length}个 | 最佳连胜：${S.bestStreak}题</div>
      <div style="margin-top:8px">${ts.map(t=>`<span class="tier-badge ${t.unlocked?(t.mastery>=.7?'badge-easy':t.mastery>=.4?'badge-med':'badge-hard'):'badge-lock'}">${t.name.split(' ')[0]} ${Math.round(t.mastery*100)}%</span>`).join(' ')}</div>
      <div class="btn-row">
        <button class="btn btn-g btn-lg" onclick="nextRound()">▶️ 继续闯关</button>
        <button class="btn btn-o btn-lg" onclick="renderHome()">🏠 回主页</button>
      </div>
    </div>
  </div>`;
}

function resetData(){if(confirm('确定要重新开始吗？')){S={correct:{},wrong:{},totalCorrect:0,totalWrong:0,tierLevel:1,streak:0,bestStreak:0,mode:'emoji',rounds:0,recent:[],lastReview:{},unlockedTiers:[1]};save(S);renderHome()}}
renderHome();
</script>
</body>
</html>
