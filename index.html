<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌟 小美识字乐园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Noto Sans SC','KaiTi','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#fef9c3 0%,#fef3c7 40%,#fde68a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;overflow-y:auto}
.container{width:100%;max-width:520px;padding:12px;min-height:100vh;display:flex;flex-direction:column}

/* ── 通用 ── */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.95)}
.btn-big{font-size:22px;padding:16px 32px}
.btn-med{font-size:17px;padding:12px 24px}
.btn-yellow{background:#f59e0b;color:#fff}
.btn-yellow:hover{background:#d97706}
.btn-green{background:#10b981;color:#fff}
.btn-purple{background:#8b5cf6;color:#fff}
.btn-outline{background:#fff;border:3px solid #fbbf24;color:#92400e}

/* ── 主页 ── */
.home{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.home .logo{font-size:80px;animation:bounce 1.5s ease-in-out infinite}
.home h1{font-size:32px;color:#92400e;text-shadow:2px 2px 0 rgba(255,255,255,.6)}
.home .subtitle{font-size:15px;color:#a16207}
.home .stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.home .stat{background:#fff;border-radius:16px;padding:12px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;min-width:80px}
.home .stat .num{font-size:28px;font-weight:800;color:#f59e0b}
.home .stat .lbl{font-size:11px;color:#a8a29e}
.mode-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.mode-btn{width:100%;font-size:20px;padding:16px;text-align:left;display:flex;align-items:center;gap:12px;justify-content:flex-start}
.mode-btn .icon{font-size:32px}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

/* ── 游戏区 ── */
.game{flex:1;display:flex;flex-direction:column;gap:12px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.top-bar .back{font-size:24px;background:none;border:none;cursor:pointer;padding:4px 8px}
.top-bar .score-area{display:flex;align-items:center;gap:8px;font-size:16px;color:#92400e;font-weight:600}
.top-bar .streak{font-size:18px}
.progress-outer{height:10px;background:#fef3c7;border-radius:5px;overflow:hidden}
.progress-inner{height:100%;background:linear-gradient(90deg,#fbbf24,#10b981);border-radius:5px;transition:width .4s}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border-radius:24px;padding:20px;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center;gap:12px}
.card-area .prompt{font-size:18px;color:#78716c}
.card-area .display{font-size:88px;line-height:1.1;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.card-area .display.char{font-size:72px;font-weight:700;color:#78350f;font-family:'KaiTi','PingFang SC',serif}
.card-area .hint{font-size:14px;color:#a8a29e;padding:0 16px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt{background:#fefce8;border:3px solid #fde68a;border-radius:16px;padding:16px 8px;font-size:32px;font-weight:700;color:#78350f;cursor:pointer;transition:all .2s;font-family:'KaiTi','PingFang SC',serif}
.opt:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(251,191,36,.2)}
.opt:active{transform:scale(.94)}
.opt.correct{background:#dcfce7;border-color:#4ade80;color:#166534;animation:pop .5s}
.opt.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b;animation:shake .5s}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.feedback-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:72px;pointer-events:none;z-index:100}
.feedback-pop.show{animation:fbPop 1s ease-out forwards}
@keyframes fbPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}}

/* ── 结果页 ── */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s}
.result-card{background:#fff;border-radius:28px;padding:32px 24px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.12);max-width:380px;width:90%;animation:scaleIn .4s}
.result-card .trophy{font-size:64px}
.result-card h2{font-size:24px;color:#92400e;margin:8px 0}
.result-card .big-num{font-size:44px;font-weight:800;color:#f59e0b}
.result-card .detail{font-size:13px;color:#a8a29e;margin:4px 0}
.result-card .btn-row{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* ── 难度标签 ── */
.level-tag{display:inline-block;font-size:12px;padding:2px 10px;border-radius:8px;font-weight:600}
.lv-easy{background:#dcfce7;color:#166534}
.lv-med{background:#fef3c7;color:#92400e}
.lv-hard{background:#fee2e2;color:#991b1b}

/* ── confetti ── */
.confetti{position:fixed;z-index:250;pointer-events:none;animation:cfFall 2s ease-out forwards}
@keyframes cfFall{0%{transform:translateY(-80px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ── 响应式 ── */
@media(max-width:400px){
 .home .logo{font-size:56px}
 .home h1{font-size:24px}
 .card-area .display{font-size:60px}
 .card-area .display.char{font-size:50px}
 .opt{font-size:26px;padding:12px 4px}
}
</style>

// ── 去重 ──
const seen=new Set();
const CHARS=CHAR_DB.filter(x=>{if(seen.has(x.c))return false;seen.add(x.c);return true});

// ═══════════════════════════════════════════
// 持久化存储
// ═══════════════════════════════════════════
const LS={get(k,d){try{const v=localStorage.getItem('xm_literacy_'+k);return v?JSON.parse(v):d}catch(e){return d}},set(k,v){try{localStorage.setItem('xm_literacy_'+k,JSON.stringify(v))}catch(e){}}};

function saveState(s){LS.set('state',s)}
function loadState(){
  return LS.get('state',{
    correct:{},wrong:{},totalCorrect:0,totalWrong:0,currentLevel:1,streak:0,bestStreak:0,mode:'emoji2char',roundsPlayed:0
  });
}

// ═══════════════════════════════════════════
// 间隔重复：错误字返回间隔（题数）
// ═══════════════════════════════════════════
function reviewInterval(wrongCount){
  if(wrongCount<=1)return 3;
  if(wrongCount<=3)return 5;
  if(wrongCount<=6)return 8;
  return 12;
}

function getReviewQueue(state){
  const queue=[];
  for(const[c,count]of Object.entries(state.wrong)){
    const correct=state.correct[c]||0;
    if(correct<5||count>0){
      queue.push({c,priority:count-correct*0.5,since:state.roundsPlayed-(state._lastReview?.[c]||0)});
    }
  }
  queue.sort((a,b)=>b.priority-a.priority);
  return queue;
}

// ═══════════════════════════════════════════
// 自适应难度：根据最近准确率调整字难度
// ═══════════════════════════════════════════
function getDifficultyLevel(state){
  const recent=state._recentResults||[];
  if(recent.length<8)return state.currentLevel;
  const acc=recent.filter(r=>r).length/recent.length;
  if(acc>0.85&&state.currentLevel<5)return state.currentLevel+1;
  if(acc<0.5&&state.currentLevel>1)return state.currentLevel-1;
  return state.currentLevel;
}

// ═══════════════════════════════════════════
// 选题逻辑
// ═══════════════════════════════════════════
function pickQuestion(state){
  const lvl=getDifficultyLevel(state);
  const pool=CHARS.filter(c=>c.d<=lvl);
  // 优先从复习队列选
  const queue=getReviewQueue(state);
  let target;
  if(queue.length>0&&Math.random()<0.5){
    target=pool.find(c=>c.c===queue[0].c)||pool[Math.floor(Math.random()*pool.length)];
  }else{
    // 加权随机：偏重错得多的字
    const weights=pool.map(c=>{
      const wc=state.wrong[c.c]||0;
      const cc=state.correct[c.c]||0;
      return 1+(wc*3)/(cc+1);
    });
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){target=pool[i];break}}
    if(!target)target=pool[Math.floor(Math.random()*pool.length)];
  }
  // 生成选项
  const wrongs=pool.filter(c=>c.c!==target.c).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[target,...wrongs].sort(()=>Math.random()-.5);
  return {target,opts,lvl};
}

// 音效
// ═══════════════════════════════════════════
let actx=null;
function ctx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tone(f,d,t='sine',v=0.1){
  try{const o=ctx().createOscillator(),g=ctx().createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ctx().currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx().currentTime+d);o.connect(g);g.connect(ctx().destination);o.start();o.stop(ctx().currentTime+d)}catch(e){}
}
function sfxOk(){tone(523,.08);setTimeout(()=>tone(659,.08),80);setTimeout(()=>tone(784,.12),160)}
function sfxNo(){tone(180,.2,'square',.06)}
function sfxStar(){tone(880,.06);setTimeout(()=>tone(1047,.06),60);setTimeout(()=>tone(1319,.1),120)}
function sfxWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.15),i*100))}

let state=loadState();
let q=null,answering=false,roundInSession=0;

function r(){render();ctx()} // init audio on first interaction
function render(){
  const app=document.getElementById('app');

      <p class="subtitle">已掌握 ${Object.keys(state.correct).length} 个字 · 连胜 ${state.bestStreak} 题</p>
      <div class="stats">
        <div class="stat"><div class="num">⭐ ${state.totalCorrect}</div><div class="lbl">正确</div></div>
        <div class="stat"><div class="num">🔄 ${state.totalWrong}</div><div class="lbl">待复习</div></div>
        <div class="stat"><div class="num"><span class="level-tag lv-${state.currentLevel<=2?'easy':state.currentLevel<=4?'med':'hard'}">Lv${state.currentLevel}</span></div><div class="lbl">难度</div></div>
      </div>
      <div class="mode-btns">
        <button class="btn btn-yellow btn-big mode-btn" onclick="startGame('emoji2char')"><span class="icon">🖼️→📝</span> 看图识字</button>
        <button class="btn btn-green btn-big mode-btn" onclick="startGame('char2emoji')"><span class="icon">📝→🖼️</span> 看字找图</button>
        <button class="btn btn-purple btn-big mode-btn" onclick="startGame('meaning')"><span class="icon">💡→📝</span> 看提示猜字</button>
        <button class="btn btn-outline btn-med" onclick="resetData()" style="margin-top:8px">🔄 重新开始</button>
      </div>
    </div>`;
}

function startGame(mode){
  ctx();
  state.mode=mode;roundInSession=0;
  state._recentResults=state._recentResults||[];
  state._lastReview=state._lastReview||{};
  nextRound();
}

function nextRound(){
  q=pickQuestion(state);
  answering=false;
  roundInSession++;
  state.roundsPlayed++;
  const app=document.getElementById('app');
  const mode=state.mode;
  const t=q.target;
  let prompt,display,displayClass;
  if(mode==='emoji2char'){
    prompt='这是什么字？';
    display=t.e||'📝';displayClass='';
  }else if(mode==='char2emoji'){
    prompt='找一找对应的图片';
    display=t.c;displayClass='char';
  }else{
    prompt='根据提示，选正确的字';
    display='💡';displayClass='';
  }
  app.innerHTML=`
    <div class="game">
      <div class="top-bar">
        <button class="back" onclick="r()">🏠</button>
        <div class="score-area">
          <span>🔥 ${state.streak}</span>
          <span class="level-tag lv-${state.currentLevel<=2?'easy':state.currentLevel<=4?'med':'hard'}">Lv${state.currentLevel}</span>
          <span>⭐ ${state.totalCorrect}</span>
        </div>
      </div>
      <div class="progress-outer"><div class="progress-inner" style="width:${Math.min(100,roundInSession/15*100)}%"></div></div>
      <div class="card-area">
        <div class="prompt">${prompt}</div>
        <div class="display ${displayClass}">${display}</div>
        ${mode==='meaning'?`<div class="hint">💡 ${t.h}</div>`:''}
        ${mode==='emoji2char'?`<div class="hint">${t.h}</div>`:''}
        <div class="options-grid" id="opts"></div>
      </div>
    </div>`;
  const grid=document.getElementById('opts');
  q.opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=mode==='char2emoji'?(o.e||'❓'):o.c;
    btn.addEventListener('click',()=>handleAnswer(o.c));
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen){
  if(answering)return;answering=true;
  const correct=chosen===q.target.c;
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  // 找到按钮
  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent===chosen)b.classList.add(correct?'correct':'wrong');
    if(!correct&&b.textContent===q.target.c)setTimeout(()=>b.classList.add('correct'),400);
  });
  // 更新状态
  if(correct){
    state.correct[q.target.c]=(state.correct[q.target.c]||0)+1;
    if(state.wrong[q.target.c])state.wrong[q.target.c]=Math.max(0,(state.wrong[q.target.c]||0)-1);
    state.totalCorrect++;state.streak++;
    if(state.streak>state.bestStreak)state.bestStreak=state.streak;
    state._recentResults.push(true);if(state._recentResults.length>20)state._recentResults.shift();
    sfxOk();
    showFb('✅');
  }else{
    state.wrong[q.target.c]=(state.wrong[q.target.c]||0)+1;
    state.totalWrong++;state.streak=0;
    state._recentResults.push(false);if(state._recentResults.length>20)state._recentResults.shift();
    sfxNo();
    showFb('❌');
  }
  state._lastReview[q.target.c]=state.roundsPlayed;
  state.currentLevel=getDifficultyLevel(state);
  saveState(state);

  // 每15题检查是否升级
  const doCheck=roundInSession%15===0&&roundInSession>0;
  setTimeout(()=>{
    if(doCheck&&roundInSession>=45){
      showResult();
    }else{
      nextRound();
    }
  },correct?700:1000);
}

function showFb(e){
  const el=document.getElementById('fpop');
  el.textContent=e;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}

function showResult(){
  const app=document.getElementById('app');
  const recent=state._recentResults.slice(-15)||[];
  const acc15=recent.length>0?Math.round(recent.filter(r=>r).length/recent.length*100):0;
  const lvl=getDifficultyLevel(state);
  sfxWin();
  spawnConfetti();
  app.innerHTML=`
    <div class="result-overlay" onclick="event.target===this&&nextRound()">
      <div class="result-card">
        <div class="trophy">${acc15>=80?'🏆':'🌟'}</div>
        <h2>${acc15>=80?'太棒了！':acc15>=60?'继续加油！':'别灰心！'}</h2>
        <div class="big-num">${acc15}%</div>
        <div class="detail">最近15题正确率</div>
        <div class="detail">当前难度：<span class="level-tag lv-${lvl<=2?'easy':lvl<=4?'med':'hard'}">Lv${lvl}</span></div>
        <div class="detail">已掌握 ${Object.keys(state.correct).length} 个字 | 连胜 ${state.bestStreak} 题</div>
        <div class="btn-row">
          <button class="btn btn-green btn-med" onclick="spawnConfetti();nextRound()">▶️ 继续闯关</button>
          <button class="btn btn-outline btn-med" onclick="r()">🏠 回主页</button>
        </div>
      </div>
    </div>`;
}

function spawnConfetti(){
  const cs=['#fbbf24','#f59e0b','#ef4444','#3b82f6','#10b981','#8b5cf6','#ec4899'];
  for(let i=0;i<40;i++)setTimeout(()=>{
    const d=document.createElement('div');d.className='confetti';
    d.style.left=Math.random()*100+'%';d.style.top=-(Math.random()*30+5)+'px';
    d.style.width=(Math.random()*8+4)+'px';d.style.height=(Math.random()*8+4)+'px';
    d.style.background=cs[Math.floor(Math.random()*cs.length)];
    d.style.borderRadius=Math.random()>.5?'50%':'2px';d.style.animationDuration=(Math.random()*1.5+1.2)+'s';
    document.body.appendChild(d);setTimeout(()=>d.remove(),2500);
  },i*20);
}

function resetData(){
  if(confirm('确定要重新开始吗？所有进度将被清空。')){
    state={correct:{},wrong:{},totalCorrect:0,totalWrong:0,currentLevel:1,streak:0,bestStreak:0,mode:'emoji2char',roundsPlayed:0,_recentResults:[],_lastReview:{}};
    saveState(state);r();
  }
}
